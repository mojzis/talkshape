services:
  talkshape:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ../skill-build123d:/home/claude/.claude/skills/build123d:ro
      - ./projects:/workspace/projects
      - ~/.claude/.credentials.json:/home/claude/.claude/.credentials.json:ro
    mem_limit: 4g
    cpus: 2
    restart: unless-stopped
